# fluent-bit-values.yaml
daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
      type: Directory
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
      type: Directory

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

nodeSelector:
  agentpool: infra

config:
  inputs: |
    [INPUT]
        Name tail
        Tag opensearch-operator.*
        Path /var/log/containers/*opensearch-operator*.log
        Parser docker
        DB /var/log/flb_opensearch_operator.db
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match opensearch-operator.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

    [FILTER]
        Name record_modifier
        Match opensearch-operator.*
        Record cluster poc-cluster
        Record source opensearch-operator

  outputs: |
    [OUTPUT]
        Name kafka
        Match opensearch-operator.*
        Brokers poc-kafka-kafka-bootstrap:9092
        Topics poc-opensearch-operator-logs
        Timestamp_Key @timestamp
        Retry_Limit 3
