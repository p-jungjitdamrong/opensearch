apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: signoz-vs
  namespace: signoz
spec:
  hosts:
    - "signoz.openpoc.dpdns.org"
  gateways:
    - istio-system/poc-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: signoz
            port:
              number: 8080
